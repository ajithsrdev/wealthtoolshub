<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SIP Calculator India</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="navbar">
  <div class="container nav">
    <a href="index.html">EMI Calculator</a>
    <a href="sip-calculator.html" class="active">SIP Calculator</a>
  </div>
</header>

<div class="container card">

<h2>SIP Calculator</h2>

<label>Monthly Investment (₹)</label>
<input type="number" id="monthlyInvestment" value="5000">

<label>Expected Return (%)</label>
<input type="number" id="annualReturn" value="12">

<label>Duration (Years)</label>
<input type="number" id="years" value="10">

<button onclick="calculateSIP()">Calculate SIP</button>

<div class="result">
<p>Total Invested: ₹ <span id="totalInvested">0</span></p>
<p>Estimated Returns: ₹ <span id="estimatedReturns">0</span></p>
<p>Total Value: ₹ <span id="totalValue">0</span></p>
</div>

</div>

<script src="js/sip.js"></script>

</body>
</html>
