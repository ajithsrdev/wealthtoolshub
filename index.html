<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMI Calculator India</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="navbar">
  <div class="container nav">
    <a href="index.html" class="active">EMI Calculator</a>
    <a href="sip-calculator.html">SIP Calculator</a>
  </div>
</header>

<div class="container card">

<h2>EMI Calculator</h2>

<label>Loan Amount (₹)</label>
<input type="number" id="loanAmount" value="1000000">

<label>Interest Rate (%)</label>
<input type="number" id="interestRate" value="8">

<label>Loan Tenure (Years)</label>
<input type="number" id="loanTenure" value="20">

<button onclick="calculateEMI()">Calculate EMI</button>

<div class="result">
<p>Monthly EMI: ₹ <span id="emiResult">0</span></p>
<p>Total Interest: ₹ <span id="totalInterest">0</span></p>
<p>Total Payment: ₹ <span id="totalPayment">0</span></p>
</div>

</div>

<script src="js/emi.js"></script>

</body>
</html>
