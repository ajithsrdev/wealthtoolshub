<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WealthToolsHub - Smart Finance Calculators</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html { scroll-behavior: smooth; }
</style>
</head>

<body class="bg-white text-gray-800 transition duration-300" id="body">

<!-- Navbar -->
<nav class="flex justify-between items-center p-6 shadow-md">
  <h1 class="text-2xl font-bold text-blue-600">WealthToolsHub</h1>
  <button onclick="toggleDark()" class="px-4 py-2 bg-blue-600 text-white rounded-lg">
    Toggle Dark Mode
  </button>
</nav>

<!-- Hero Section -->
<section class="text-center py-16 bg-gradient-to-r from-blue-100 to-blue-50">
  <h2 class="text-4xl font-bold mb-4">Smart Finance Tools for Better Decisions</h2>
  <p class="text-lg text-gray-600">Calculate EMI, SIP returns and more instantly.</p>
</section>

<!-- EMI Calculator -->
<section class="max-w-xl mx-auto p-6 mt-10 shadow-lg rounded-xl bg-white">
  <h3 class="text-2xl font-bold mb-4 text-blue-600">EMI Calculator</h3>
  <input id="loan" type="number" placeholder="Loan Amount" class="w-full p-2 mb-3 border rounded">
  <input id="rate" type="number" placeholder="Interest Rate (%)" class="w-full p-2 mb-3 border rounded">
  <input id="tenure" type="number" placeholder="Tenure (Years)" class="w-full p-2 mb-3 border rounded">
  <button onclick="calculateEMI()" class="w-full bg-blue-600 text-white py-2 rounded">Calculate EMI</button>
  <p id="emiResult" class="mt-4 font-semibold text-lg"></p>
</section>

<!-- SIP Calculator -->
<section class="max-w-xl mx-auto p-6 mt-10 shadow-lg rounded-xl bg-white">
  <h3 class="text-2xl font-bold mb-4 text-blue-600">SIP Calculator</h3>
  <input id="sipAmount" type="number" placeholder="Monthly Investment" class="w-full p-2 mb-3 border rounded">
  <input id="sipRate" type="number" placeholder="Expected Return (%)" class="w-full p-2 mb-3 border rounded">
  <input id="sipYears" type="number" placeholder="Years" class="w-full p-2 mb-3 border rounded">
  <button onclick="calculateSIP()" class="w-full bg-blue-600 text-white py-2 rounded">Calculate SIP</button>
  <p id="sipResult" class="mt-4 font-semibold text-lg"></p>
</section>

<!-- Footer -->
<footer class="text-center p-6 mt-16 bg-gray-100">
  <p>© 2026 WealthToolsHub. All rights reserved.</p>
</footer>

<script>
function calculateEMI() {
  let P = document.getElementById("loan").value;
  let annualRate = document.getElementById("rate").value;
  let years = document.getElementById("tenure").value;

  let R = annualRate / 12 / 100;
  let N = years * 12;

  let EMI = (P * R * Math.pow(1 + R, N)) / (Math.pow(1 + R, N) - 1);
  document.getElementById("emiResult").innerText =
    "Monthly EMI: ₹ " + EMI.toFixed(2);
}

function calculateSIP() {
  let P = document.getElementById("sipAmount").value;
  let annualRate = document.getElementById("sipRate").value;
  let years = document.getElementById("sipYears").value;

  let R = annualRate / 12 / 100;
  let N = years * 12;

  let FV = P * ((Math.pow(1 + R, N) - 1) / R) * (1 + R);
  document.getElementById("sipResult").innerText =
    "Future Value: ₹ " + FV.toFixed(2);
}

function toggleDark() {
  const body = document.getElementById("body");
  body.classList.toggle("bg-gray-900");
  body.classList.toggle("text-white");
}
</script>

</body>
</html>
