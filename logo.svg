<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60" width="380" height="60">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: upward chart bars, no background box -->
  <rect x="0" y="38" width="8" height="14" rx="2" fill="url(#barGrad)" opacity="0.6"/>
  <rect x="11" y="28" width="8" height="24" rx="2" fill="url(#barGrad)" opacity="0.8"/>
  <rect x="22" y="18" width="8" height="34" rx="2" fill="url(#barGrad)"/>

  <!-- Trend line -->
  <polyline points="4,36 15,26 26,16 38,8" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="38" cy="8" r="2.5" fill="#60a5fa"/>

  <!-- Main brand name: all on one line -->
  <text x="52" y="37" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#0f172a">Wealth</tspan><tspan fill="#1d4ed8">Tools</tspan><tspan fill="#0f172a">Hub</tspan>
  </text>

  <!-- Tagline -->
  <text x="53" y="51" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" letter-spacing="2">FREE FINANCIAL CALCULATORS FOR INDIA</text>
</svg>
